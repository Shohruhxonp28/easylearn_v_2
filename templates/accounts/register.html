{% extends 'base.html' %}
{% block title %}Register — EduComp{% endblock %}
{% block content %}
<div style="min-height:80vh;display:flex;align-items:center;justify-content:center;padding:40px 24px">
  <div style="width:100%;max-width:440px">
    <div style="text-align:center;margin-bottom:32px">
      <div style="font-size:3rem;margin-bottom:12px">⚡</div>
      <h1 style="font-size:1.8rem;font-weight:800">Create Account</h1>
      <p class="text-muted mt-8">Join EduComp and start competing</p>
    </div>
    <div class="card">
      <div class="card-body">
        <form method="post">
          {% csrf_token %}
          <div class="form-group">
            <label class="form-label">Full Name *</label>
            <input type="text" name="full_name" class="form-control" placeholder="Your full name" required>
          </div>
          <div class="form-group">
            <label class="form-label">Username *</label>
            <input type="text" name="username" class="form-control" placeholder="username" required>
          </div>
          <div class="form-group">
            <label class="form-label">Password *</label>
            <input type="password" name="password1" class="form-control" placeholder="Password" required>
          </div>
          <div class="form-group">
            <label class="form-label">Confirm Password *</label>
            <input type="password" name="password2" class="form-control" placeholder="Confirm" required>
          </div>
          <button type="submit" class="btn btn-primary btn-block btn-lg">Create Account</button>
        </form>
      </div>
      <div class="card-footer text-center">
        Already have an account? <a href="{% url 'login' %}" class="text-primary">Login</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
