{% extends 'base.html' %}
{% block title %}Login — EduComp{% endblock %}
{% block content %}
<div style="min-height:80vh;display:flex;align-items:center;justify-content:center;padding:40px 24px">
  <div style="width:100%;max-width:400px">
    <div style="text-align:center;margin-bottom:32px">
      <div style="font-size:3rem;margin-bottom:12px">🔐</div>
      <h1 style="font-size:1.8rem;font-weight:800">Welcome Back</h1>
      <p class="text-muted mt-8">Login to continue competing</p>
    </div>
    <div class="card">
      <div class="card-body">
        <form method="post">
          {% csrf_token %}
          <div class="form-group">
            <label class="form-label">Username</label>
            <input type="text" name="username" class="form-control" placeholder="username" required>
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" placeholder="Password" required>
          </div>
          <button type="submit" class="btn btn-primary btn-block btn-lg">Login</button>
        </form>
      </div>
      <div class="card-footer text-center">
        No account? <a href="{% url 'register' %}" class="text-primary">Register</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
