{% extends 'base.html' %}
{% block title %}Join {{ arena.title }} — EduComp{% endblock %}
{% block content %}
<div style="min-height:80vh;display:flex;align-items:center;justify-content:center;padding:40px 24px">
  <div style="width:100%;max-width:440px">
    <div style="text-align:center;margin-bottom:32px">
      <div style="font-size:3rem;margin-bottom:12px">🏟️</div>
      <h1 style="font-size:1.8rem;font-weight:800">Join Arena</h1>
      <p class="text-muted mt-8">{{ arena.title }}</p>
    </div>
    <div class="card">
      <div class="card-body">
        <div style="background:var(--primary-light);border-radius:var(--radius-sm);padding:16px;margin-bottom:20px">
          <p style="font-size:.875rem;color:var(--primary);font-weight:500">No account needed! Just enter your name to compete.</p>
        </div>
        <form method="post">
          {% csrf_token %}
          <div class="form-group">
            <label class="form-label">Your Name</label>
            <input type="text" name="full_name" class="form-control" placeholder="Enter your name" required autofocus>
          </div>
          <button type="submit" class="btn btn-danger btn-block btn-lg">🔴 Enter Arena!</button>
        </form>
      </div>
      <div class="card-footer text-center">
        Have an account? <a href="{% url 'login' %}?next={% url 'arena_join' arena.id %}" class="text-primary">Login for rating tracking</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
