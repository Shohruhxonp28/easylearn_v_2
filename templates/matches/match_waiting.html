{% extends 'base.html' %}
{% block title %}Waiting for Opponent{% endblock %}
{% block content %}
<div style="max-width:480px;margin:80px auto;text-align:center">
  <div class="ec-card" style="padding:48px 32px">
    <div style="font-size:3.5rem;margin-bottom:16px">⏳</div>
    <h2 style="font-size:1.5rem;font-weight:800;letter-spacing:-.5px;margin-bottom:8px">Waiting for {{ opponent_name }}</h2>
    <p style="color:var(--gray-400);margin-bottom:24px">You answered all {{ total }} questions! Waiting for your opponent to finish...</p>
    <!-- Animated dots -->
    <div style="display:flex;justify-content:center;gap:8px;margin-bottom:32px">
      <div style="width:10px;height:10px;border-radius:50%;background:var(--primary);animation:bounce .8s ease-in-out infinite"></div>
      <div style="width:10px;height:10px;border-radius:50%;background:var(--primary);animation:bounce .8s ease-in-out .15s infinite"></div>
      <div style="width:10px;height:10px;border-radius:50%;background:var(--primary);animation:bounce .8s ease-in-out .3s infinite"></div>
    </div>
    <a href="{% url 'match_result' match.id %}" class="ec-btn ec-btn-primary">Check Result</a>
    <div style="margin-top:12px">
      <a href="{% url 'dashboard' %}" class="ec-btn ec-btn-ghost ec-btn-sm">← Dashboard</a>
    </div>
  </div>
</div>
<style>
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
</style>
<script>
setTimeout(function(){ window.location.reload(); }, 4000);
</script>
{% endblock %}
